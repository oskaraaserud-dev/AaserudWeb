<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takk for din henvendelse | AaserudWeb</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

<a href="#innhold" class="skip-link">Hopp til hovedinnhold</a>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f7cff"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>
  <symbol id="logo-mark" viewBox="0 0 100 100">
    <path d="M22 78 L50 22 L78 78" fill="none" stroke="url(#logoGrad)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="60" r="7" fill="url(#logoGrad)"/>
  </symbol>
</svg>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <svg class="logo-mark" aria-hidden="true"><use href="#logo-mark"/></svg>
      <span class="logo-text">Aaserud<span class="logo-accent">Web</span></span>
    </a>
  </div>
</header>

<main id="innhold" tabindex="-1">
  <section class="hero thanks-hero">
    <div class="hero-glow"></div>
    <div class="container hero-inner thanks-inner">
      <div class="thanks-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 12.5l5 5L20 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <p class="eyebrow">Melding sendt</p>
      <h1>Takk for din <span class="text-gradient">henvendelse!</span></h1>
      <p class="hero-lead">
        Meldingen din er mottatt. Jeg tar kontakt med deg på e-post eller telefon
        så raskt som mulig, vanligvis innen 1-2 virkedager.
      </p>
      <div class="hero-actions">
        <a href="index.html" class="btn btn-primary">Tilbake til forsiden</a>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <a href="index.html" class="logo">
      <svg class="logo-mark" aria-hidden="true"><use href="#logo-mark"/></svg>
      <span class="logo-text">Aaserud<span class="logo-accent">Web</span></span>
    </a>
    <p>&copy; <span id="year"></span> AaserudWeb. Alle rettigheter reservert.
      &middot; <a href="personvern.html">Personvern</a>
      &middot; <button type="button" class="consent-reopen" data-consent-reopen>Endre samtykke</button></p>
  </div>
</footer>

<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
<script src="js/consent.js"></script>
</body>
</html>
